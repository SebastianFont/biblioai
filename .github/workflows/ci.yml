  name: CI

  on:
    push:
      branches: [main]
    pull_request:

  concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

  permissions:
    contents: read

  jobs:
    check:
      name: Formato - Lint - Tipos - Tests
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: npm
        - run: npm ci
        - run: npm run format:check
        - run: npm run lint
        - run: npm run typecheck
        - run: npm test

    e2e:
      name: E2E (Playwright)
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: npm
        - run: npm ci
        - run: npx playwright install --with-deps chromium
        - run: npm run test:e2e
        - name: Subir reporte de Playwright si falla
          if: failure()
          uses: actions/upload-artifact@v4
          with:
            name: playwright-report
            path: playwright-report/
            retention-days: 7
