name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela ejecuciones viejas de la misma rama/PR si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Formato · Lint · Tipos · Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # `npm ci` corre el postinstall (prisma generate), así que el cliente
      # generado existe antes del typecheck.
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Solo Chromium (es el único proyecto configurado), con sus dependencias de SO.
      - run: npx playwright install --with-deps chromium
      # El propio test levanta Next sobre una base SQLite dedicada (se migra y
      # siembra en el comando del webServer) y con la IA en modo mock.
      - run: npm run test:e2e
      - name: Subir reporte de Playwright si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
